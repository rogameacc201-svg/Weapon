<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lineage - 天堂衝裝模擬器 (GitHub 圖片校正版)</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body {
            background-color: #030508;
            color: #c0c6d0;
            font-family: 'MingLiU', 'PMingLiU', 'Microsoft JhengHei', sans-serif;
            image-rendering: pixelated;
        }
        /* 天堂經典道具欄外框 */
        .inv-container {
            background-color: #121319;
            border: 3px solid #32353d;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.8), 0 10px 25px rgba(0,0,0,0.9);
        }
        /* 道具欄網格線 */
        .inv-grid {
            border-top: 2px solid #20222a;
            border-left: 2px solid #20222a;
        }
        /* 道具欄格子 */
        .inv-slot {
            background-color: #000000;
            border-right: 2px solid #20222a;
            border-bottom: 2px solid #20222a;
            aspect-ratio: 1;
            position: relative;
            cursor: pointer;
            transition: background 0.1s;
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-tap-highlight-color: transparent;
        }
        @media (hover: hover) {
            .inv-slot:hover {
                background-color: #141722;
            }
        }
        /* 背包內圖片大小控制 */
        .inv-slot img {
            width: 36px;
            height: 36px;
            object-fit: contain;
            image-rendering: pixelated;
        }
        /* 點選卷軸時的高亮藍框 */
        .inv-slot.selected {
            background-color: #1a2238 !important;
            box-shadow: inset 0 0 8px #3b82f6;
        }
        /* 目前選中的裝備高亮金框 */
        .inv-slot.active-item {
            border: 2px solid #daa520 !important;
            background-color: #1a1710;
        }
        /* 衝裝施法閃爍動畫 */
        .scroll-flash {
            animation: flash 0.2s ease-in-out 2;
        }
        @keyframes flash {
            0%, 100% { filter: brightness(1); }
            50% { filter: brightness(1.8) drop-shadow(0 0 8px #daa520); }
        }
        /* 調整系統滾動條外觀 */
        #system-chat::-webkit-scrollbar {
            width: 6px;
        }
        #system-chat::-webkit-scrollbar-thumb {
            background: #383b47;
            border-radius: 3px;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-start lg:justify-center py-4 px-3 select-none">

    <div class="w-full max-w-4xl flex flex-col lg:flex-row gap-5 items-stretch">
        
        <div class="flex-1 w-full flex flex-col justify-between space-y-3">
            <div class="bg-[#0b0c10] border-2 border-[#262833] rounded-lg p-5 flex flex-col items-center justify-center relative min-h-[200px] md:min-h-[230px]">
                <div id="protect-badge" class="absolute top-2 right-3 text-xs md:text-sm font-bold text-amber-400 hidden">【✨ 保護中】</div>
                <div class="text-[11px] text-gray-500 absolute top-2 left-2">【精煉裝備舞台】</div>
                
                <div id="stage-box" class="w-20 h-20 md:w-24 md:h-24 bg-black border-2 border-[#4c5161] rounded flex items-center justify-center relative cursor-pointer hover:bg-gray-900/50 transition active:scale-95">
                    <img id="stage-img" src="./w1.png" alt="裝備" class="w-14 h-14 object-contain" onerror="this.style.opacity='0.2';">
                    <span id="stage-prefix" class="absolute top-1 left-1 text-sm font-bold text-green-400"></span>
                </div>
                <div class="mt-3 text-center">
                    <h3 id="stage-name" class="text-base md:text-lg font-bold text-[#e6bc55] tracking-wide">瑟魯基之劍</h3>
                    <p id="stage-status" class="text-xs md:text-sm text-green-500 mt-1">這件物品在安定值內，絕對安全。</p>
                </div>
                <div id="result-toast" class="absolute inset-0 flex items-center justify-center bg-black/80 rounded-lg opacity-0 pointer-events-none transition-opacity duration-150">
                    <span id="toast-text" class="text-sm md:text-base font-bold tracking-wider text-center px-4"></span>
                </div>
            </div>

            <div class="bg-[#0b0c10] border border-[#262833] p-3 rounded-lg flex justify-between items-center text-xs gap-3">
                <span class="text-gray-400 leading-relaxed">💡 操作提醒：先點右側「裝備」切換目標，再選「卷軸」並點擊左側「大裝備框」衝裝！</span>
                <button onclick="resetGame()" class="bg-[#2a2c38] hover:bg-[#383b4c] text-gray-200 px-3 py-2 rounded border border-[#44485c] transition shrink-0 font-bold active:scale-95">
                    重置
                </button>
            </div>

            <div class="bg-black border border-[#20222a] p-3 rounded-lg">
                <div class="text-[11px] font-bold text-[#4c5a70] mb-1">【系統頻道】</div>
                <div id="system-chat" class="text-xs space-y-1 font-mono h-[100px] md:h-[120px] overflow-y-auto text-gray-400">
                    <p class="text-gray-500">• 模擬器已就緒。網頁已全面改為直接讀取您 GitHub 資料夾內部的圖片檔。</p>
                </div>
            </div>
        </div>

        <div class="w-full lg:w-[360px] inv-container rounded-lg p-3 flex flex-col justify-between shrink-0 gap-3">
            <div>
                <div class="flex justify-between items-center mb-2 px-1">
                    <span class="text-xs font-bold text-gray-400 tracking-wider">INVENTORY (道具欄)</span>
                    <button class="w-4 h-4 bg-[#23252e] border border-[#3d4152] text-[10px] text-gray-400 flex items-center justify-center font-bold">×</button>
                </div>

                <div class="mb-3">
                    <div class="text-[11px] font-bold text-[#556276] mb-1">【魔法卷軸類 - 上排 7 種】</div>
                    <div class="grid grid-cols-4 sm:grid-cols-7 inv-grid bg-black" id="scrolls-grid">
                        </div>
                </div>

                <div>
                    <div class="text-[11px] font-bold text-[#556276] mb-1">【精煉裝備類 - 下排 3 種】</div>
                    <div class="grid grid-cols-3 inv-grid bg-black" id="equip-grid">
                        </div>
                </div>
            </div>

            <div class="flex justify-between items-center pt-2 border-t border-[#20222a] px-1 text-xs text-[#a4aab5]">
                <div>負重: 82 / 180</div>
                <div class="w-3 h-4 bg-gradient-to-b from-blue-500 to-blue-800 border border-blue-400 rounded shadow-sm shadow-blue-500/50"></div>
            </div>
        </div>

    </div>

    <script>
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSound(type) {
            try {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain); gain.connect(audioCtx.destination);
                if (type === 'success') {
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(587.33, audioCtx.currentTime);
                    osc.frequency.setValueAtTime(880.00, audioCtx.currentTime + 0.08);
                    gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
                    osc.start(); osc.stop(audioCtx.currentTime + 0.3);
                } else if (type === 'fail') {
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(140, audioCtx.currentTime);
                    osc.frequency.linearRampToValueAtTime(30, audioCtx.currentTime + 0.4);
                    gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
                    osc.start(); osc.stop(audioCtx.currentTime + 0.4);
                } else if (type === 'click') {
                    osc.type = 'triangle';
                    osc.frequency.setValueAtTime(280, audioCtx.currentTime);
                    gain.gain.setValueAtTime(0.08, audioCtx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.05);
                    osc.start(); osc.stop(audioCtx.currentTime + 0.05);
                }
            } catch(e){}
        }
    </script>

    <script>
        // 裝備核心資料結構與圖片綁定
        let itemsState = {
            'w1': { id: 'w1', name: '瑟魯基之劍', type: 'weapon', level: 0, safe: 6, isBroken: false, isProtected: false, img: './w1.png' },
            'a1': { id: 'a1', name: '精靈金屬盔甲', type: 'armor', level: 0, safe: 4, isBroken: false, isProtected: false, img: './a1.png' },
            'a2': { id: 'a2', name: '矮人肩膀防具', type: 'armor', level: 0, safe: 6, isBroken: false, isProtected: false, img: './a2.png' }
        };

        let activeItemId = 'w1';
        let selectedScroll = null;

        // 7 種卷軸的核心資料與對應圖片綁定
        const scrollsData = [
            { id: 'w_white', name: '對武器施法的卷軸', scrollType: 'weapon', bcast: 'white', label: '白武', img: './w_white.png' },
            { id: 'a_white', name: '對盔甲施法的卷軸', scrollType: 'armor',  bcast: 'white', label: '白防', img: './a_white.png' },
            { id: 'w_bless', name: '(祝福) 對武器施法的卷軸', scrollType: 'weapon', bcast: 'bless', label: '祝武', img: './w_bless.png' },
            { id: 'a_bless', name: '(祝福) 對盔甲施法的卷軸', scrollType: 'armor',  bcast: 'bless', label: '祝防', img: './a_bless.png' },
            { id: 'w_curse', name: '(詛咒) 對武器施法的卷軸', scrollType: 'weapon', bcast: 'curse', label: '詛武', img: './w_curse.png' },
            { id: 'a_curse', name: '(詛咒) 對盔甲施法的卷軸', scrollType: 'armor',  bcast: 'curse', label: '詛防', img: './a_curse.png' },
            { id: 'w_protect', name: '保護卷軸', scrollType: 'support', bcast: 'protect', label: '保護', img: './w_protect.png' }
        ];

        // 渲染背包格子
        function renderInventory() {
            // 填入 7 種卷軸
            const sGrid = document.getElementById('scrolls-grid');
            sGrid.innerHTML = '';
            scrollsData.forEach(scr => {
                const slot = document.createElement('div');
                slot.className = 'inv-slot flex flex-col p-0.5 text-center';
                slot.setAttribute('data-id', scr.id);
                slot.innerHTML = `
                    <img src="${scr.img}" alt="${scr.label}" title="${scr.name}" onerror="this.style.opacity='0.2';">
                    <span class="text-[9px] text-gray-400 font-bold scale-90">${scr.label}</span>
                `;
                slot.onclick = () => selectScroll(scr, slot);
                sGrid.appendChild(slot);
            });

            // 填入 3 種裝備
            const eGrid = document.getElementById('equip-grid');
            eGrid.innerHTML = '';
            Object.keys(itemsState).forEach(id => {
                const item = itemsState[id];
                const slot = document.createElement('div');
                slot.className = 'inv-slot flex flex-col p-0.5 text-center';
                slot.id = `slot-${item.id}`;
                slot.innerHTML = `
                    <img src="${item.img}" alt="${item.name}" onerror="this.style.opacity='0.2';">
                    <span class="text-[9px] text-amber-600 font-bold scale-90">安:${item.safe}</span>
                `;
                slot.onclick = () => selectItem(item.id);
                eGrid.appendChild(slot);
            });
            refreshBadges();
        }

        // 更新背包內裝備的強化與損壞碎裂浮標
        function refreshBadges() {
            Object.keys(itemsState).forEach(id => {
                const slot = document.getElementById(`slot-${id}`);
                if (slot) {
                    const item = itemsState[id];
                    const oldBadge = slot.querySelector('.item-badge');
                    if (oldBadge) oldBadge.remove();

                    const badge = document.createElement('span');
                    badge.className = 'item-badge absolute top-0.5 right-1 text-[10px] font-bold font-mono';
                    
                    if (item.isBroken) {
                        badge.innerText = '❌';
                    } else if (item.level > 0) {
                        badge.innerText = `+${item.level}`;
                        badge.className += ' text-green-400';
                    }
                    slot.appendChild(badge);

                    // 選取狀態框框切換
                    if (id === activeItemId) {
                        slot.classList.add('active-item');
                    } else {
                        slot.classList.remove('active-item');
                    }
                }
            });
        }

        // 點擊切換精煉目標
        function selectItem(id) {
            playSound('click');
            activeItemId = id;
            updateStage();
            addChatLog(`切換目標 ➔ ${itemsState[id].name}`, '#c0c6d0');
        }

        // 點擊選取功能卷軸
        function selectScroll(scroll, slotElement) {
            playSound('click');
            document.querySelectorAll('#scrolls-grid .inv-slot').forEach(el => el.classList.remove('selected'));
            
            if (selectedScroll && selectedScroll.id === scroll.id) {
                selectedScroll = null;
                addChatLog(`取消選取卷軸。`, '#a4aab5');
            } else {
                selectedScroll = scroll;
                slotElement.classList.add('selected');
                addChatLog(`選取【${scroll.name}】。請點擊左側主舞台格子進行施法。`, '#e6bc55');
            }
        }

        // 觸發大裝備框衝裝
        function enchant() {
            const current = itemsState[activeItemId];
            if (current.isBroken) {
                addChatLog("❌ 裝備已損壞消失，請點擊重置按鈕！", "#ff5555");
                return;
            }
            if (!selectedScroll) {
                addChatLog("❌ 請先點選一張功能卷軸！", "#ff5555");
                return;
            }
            // 卷軸限制判定
            if (selectedScroll.scrollType !== 'support' && selectedScroll.scrollType !== current.type) {
                addChatLog(`❌ 卷軸與裝備種類不符！無法施法。`, "#ff5555");
                return;
            }

            const stageBox = document.getElementById('stage-box');
            stageBox.classList.add('scroll-flash');

            setTimeout(() => {
                stageBox.classList.remove('scroll-flash');
                executeLogic();
            }, 250);
        }

        // 核心機率判定演算法
        function executeLogic() {
            const scr = selectedScroll;
            const current = itemsState[activeItemId];
            const lvl = current.level;
            const safe = current.safe;

            // 1. 保護卷軸機制
            if (scr.bcast === 'protect') {
                if (current.isProtected) {
                    showToast(`物品已在保護中。`, 'text-gray-400');
                    addChatLog(`• 提示：${current.name} 已處於防爆保護。`, '#a4aab5');
                } else {
                    current.isProtected = true;
                    playSound('success');
                    showToast(`${current.name} 附加防爆狀態！`, 'text-amber-400');
                    addChatLog(`🛡️ 施法成功：${current.name} 進入【保護中】。`, '#fbbf24');
                }
                updateStage();
                return;
            }

            // 2. 詛咒退階機制
            if (scr.bcast === 'curse') {
                if (lvl > 0) {
                    current.level -= 1;
                    playSound('success');
                    showToast(`${current.name} 受到詛咒退階...`, 'text-[#ef4444]');
                    addChatLog(`🩸 詛咒退階：+${lvl} ➔ +${current.level}。`, '#ef4444');
                } else {
                    playSound('click');
                    showToast(`沒有任何事情發生。`, 'text-gray-400');
                    addChatLog(`• 結果：+0 裝備不受詛咒降階影響。`, '#a4aab5');
                }
                updateStage();
                return;
            }

            // 3. 一般/祝福 衝裝機率設定
            let successChance = 100;
            if (lvl >= safe) {
                const over = lvl - safe;
                if (over === 0) successChance = 33;
                else if (over === 1) successChance = 25;
                else if (over === 2) successChance = 20;
                else successChance = 10;
            }

            const roll = Math.random() * 100;

            if (roll < successChance) {
                // 🟢 成功升階
                let plus = 1;
                if (scr.bcast === 'bless') {
                    const r = Math.random();
                    if (current.type === 'weapon') {
                        // 武器祝福限制：+6前最多+2，+6後固定+1
                        plus = (lvl < 6) ? ((r < 0.5) ? 1 : 2) : 1;
                    } else {
                        // 防具祝福限制：+3前最多+3，+3後最多+2
                        if (lvl < 3) {
                            plus = (r < 0.33) ? 1 : ((r < 0.66) ? 2 : 3);
                        } else {
                            plus = (r < 0.5) ? 1 : 2;
                        }
                    }
                }

                current.level += plus;
                playSound('success');
                showToast(`${current.name} 發出藍色的光芒！`, 'text-[#5599ff]');
                addChatLog(`✨ 強化成功：+${lvl} ➔ +${current.level} (增加 +${plus})。`, '#5599ff');
            } else {
                // 🔴 強化失敗
                if (current.isProtected) {
                    current.isProtected = false; // 必消耗保護
                    const rand = Math.random() * 100;
                    if (rand < 75) {
                        // 75% 退一階
                        if (lvl > 0) {
                            current.level -= 1;
                            playSound('success');
                            showToast(`防爆觸發！裝備降階。`, 'text-amber-500');
                            addChatLog(`🛡️ 防爆機制：裝備完好，階級退回 +${current.level}，保護效果已消失。`, '#f59e0b');
                        } else {
                            playSound('click');
                            showToast(`防爆觸發！維持 +0。`, 'text-gray-400');
                            addChatLog(`🛡️ 防爆機制：+0裝備維持原樣，保護效果已消失。`, '#a4aab5');
                        }
                    } else {
                        // 25% 不動
                        playSound('click');
                        showToast(`防爆觸發！階級幸運不變。`, 'text-gray-300');
                        addChatLog(`🛡️ 防爆機制：觸發 25% 幸運概率，保持 +${lvl}，保護效果已消失。`, '#e5e7eb');
                    }
                } else {
                    // 💥 無防爆碎裂消失
                    current.isBroken = true;
                    playSound('fail');
                    showToast(`${current.name} 劇烈地顫抖之後消失了。`, 'text-[#fe3e3e]');
                    addChatLog(`💥 萬物皆空：+${lvl} ${current.name} 劇烈地顫抖之後消失了。`, '#fe3e3e');
                }
            }
            updateStage();
        }

        // 刷新大舞台與左側面板顯示
        function updateStage() {
            const current = itemsState[activeItemId];

            const stageImg = document.getElementById('stage-img');
            const prefixSpan = document.getElementById('stage-prefix');
            const nameLabel = document.getElementById('stage-name');
            const statusLabel = document.getElementById('stage-status');
            const protectBadge = document.getElementById('protect-badge');

            if (current.isProtected && !current.isBroken) {
                protectBadge.classList.remove('hidden');
            } else {
                protectBadge.classList.add('hidden');
            }

            if (current.isBroken) {
                stageImg.style.opacity = '0.1';
                prefixSpan.innerText = '';
                nameLabel.innerText = `${current.name} (已消失)`;
                nameLabel.className = "text-base md:text-lg font-bold text-gray-600 line-through";
                statusLabel.innerText = "這件物品已被摧毀。";
                statusLabel.className = "text-xs text-red-600 mt-1";
            } else {
                stageImg.src = current.img;
                stageImg.style.opacity = '1';
                prefixSpan.innerText = current.level > 0 ? `+${current.level}` : '';
                nameLabel.innerText = current.level > 0 ? `+${current.level} ${current.name}` : current.name;
                nameLabel.className = "text-base md:text-lg font-bold text-[#e6bc55] tracking-wide";

                if (current.level < current.safe) {
                    statusLabel.innerText = `這件物品在安定值 (${current.safe}) 內，絕對安全。`;
                    statusLabel.className = "text-xs text-green-400 mt-1";
                } else {
                    statusLabel.innerText = `⚠️ 已過安定值 (${current.safe})！衝裝有機率爆裝。`;
                    statusLabel.className = "text-xs text-amber-500 mt-1";
                }
            }
            refreshBadges();
        }

        // 飄字對話框動畫
        function showToast(text, colorClass) {
            const toast = document.getElementById('result-toast');
            const toastText = document.getElementById('toast-text');
            toastText.innerText = text;
            toastText.className = `text-sm md:text-base font-bold tracking-wider text-center px-4 ${colorClass}`;
            toast.style.opacity = '1';
            setTimeout(() => { toast.style.opacity = '0'; }, 1200);
        }

        // 寫入系統頻道
        function addChatLog(text, colorHex) {
            const chat = document.getElementById('system-chat');
            const p = document.createElement('p');
            p.style.color = colorHex;
            p.innerText = `• ${text}`;
            chat.appendChild(p);
            chat.scrollTop = chat.scrollHeight;
        }

        // 全部重置按鈕
        function resetGame() {
            itemsState = {
                'w1': { id: 'w1', name: '瑟魯基之劍', type: 'weapon', level: 0, safe: 6, isBroken: false, isProtected: false, img: './w1.png' },
                'a1': { id: 'a1', name: '精靈金屬盔甲', type: 'armor', level: 0, safe: 4, isBroken: false, isProtected: false, img: './a1.png' },
                'a2': { id: 'a2', name: '矮人肩膀防具', type: 'armor', level: 0, safe: 6, isBroken: false, isProtected: false, img: './a2.png' }
            };
            selectedScroll = null;
            activeItemId = 'w1';
            document.getElementById('system-chat').innerHTML = '<p class="text-gray-500">• 數據已重新初始化。</p>';
            renderInventory();
            updateStage();
        }

        // 點擊大框框執行衝裝
        document.getElementById('stage-box').onclick = enchant;

        // 初始化加載
        renderInventory();
        updateStage();
    </script>
</body>
</html>
