<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>好玩衝裝模擬器</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body { background-color: #030508; color: #c0c6d0; font-family: 'MingLiU', 'PMingLiU', 'Microsoft JhengHei', sans-serif; image-rendering: pixelated; font-size: 16px; }
        .inv-container { background-color: #121319; border: 2px solid #32353d; padding: 10px; }
        .inv-grid { display: grid; gap: 2px; }
        
        /* 手機版：格狀 */
        #scrolls-grid { grid-template-columns: repeat(4, 1fr); }
        #equip-grid { grid-template-columns: repeat(3, 1fr); }

        /* 電腦版：卷軸單行 */
        @media (min-width: 768px) {
            #scrolls-grid { grid-template-columns: repeat(7, 1fr); }
            .w-full.max-w-2xl { max-width: 500px; }
        }

        .inv-slot { background-color: #000000; aspect-ratio: 1; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; border: 1px solid #20222a; }
        .inv-slot img { width: 80%; height: 60%; object-fit: contain; image-rendering: pixelated; }
        .inv-slot span { font-size: 0.7em; margin-top: 2px; }
        
        .inv-slot.selected { background-color: #1a2238 !important; box-shadow: inset 0 0 8px #3b82f6; }
        .inv-slot.active-item { border: 2px solid #daa520 !important; background-color: #1a1710; }
        #system-chat { font-size: 14px; }
    </style>
</head>
<body class="min-h-screen py-4 px-3 flex flex-col items-center select-none">

    <div class="w-full max-w-2xl flex flex-col gap-3">
        <div class="inv-container rounded-lg">
            <span class="text-[12px] font-bold text-gray-500 mb-2 block">SCROLLS</span>
            <div class="inv-grid" id="scrolls-grid"></div>
        </div>

        <div class="flex gap-2 items-stretch">
            <div class="flex-1 bg-[#0b0c10] border border-[#262833] rounded-lg p-4 flex flex-col items-center justify-center relative">
                <div id="protect-badge" class="absolute top-2 right-2 text-[10px] font-bold text-amber-400 hidden">【保護中】</div>
                <div id="stage-box" class="w-20 h-20 bg-black border border-[#4c5161] rounded flex items-center justify-center cursor-pointer hover:bg-gray-900/50 transition active:scale-95">
                    <img id="stage-img" src="./w1.png" class="w-14 h-14 object-contain">
                </div>
                <div class="mt-2 text-center">
                    <h3 id="stage-name" class="font-bold text-[#e6bc55] text-sm">克特之劍</h3>
                    <p id="stage-status" class="text-[10px] text-green-500">安定值內，絕對安全。</p>
                </div>
            </div>
            <button onclick="resetGame()" class="w-12 bg-[#2a2c38] hover:bg-[#383b4c] text-gray-200 rounded border border-[#44485c] font-bold text-xs active:scale-[0.95]">重<br>置</button>
        </div>

        <div class="inv-container rounded-lg">
            <span class="text-[12px] font-bold text-gray-500 mb-2 block">EQUIPMENT</span>
            <div class="inv-grid" id="equip-grid"></div>
        </div>

        <div class="bg-black border border-[#20222a] p-3 rounded-lg text-[12px] h-[80px] overflow-y-auto" id="system-chat">
            <p class="text-gray-500">• 系統已就緒。</p>
        </div>
    </div>

    <script>
        let initialData = {
            'w1': { id: 'w1', name: '克特之劍', type: 'weapon', level: 0, safe: 6, isBroken: false, isProtected: false, img: './w1.png' },
            'a1': { id: 'a1', name: '風龍盔甲', type: 'armor', level: 0, safe: 4, isBroken: false, isProtected: false, img: './a1.png' },
            'a2': { id: 'a2', name: '風龍鞋', type: 'armor', level: 0, safe: 6, isBroken: false, isProtected: false, img: './a2.png' }
        };
        let itemsState = JSON.parse(JSON.stringify(initialData));
        let activeItemId = 'w1';
        let selectedScroll = null;
        const scrollsData = [
            { id: 'w_white', scrollType: 'weapon', bcast: 'white', label: '白武', img: './w_white.png' },
            { id: 'a_white', scrollType: 'armor',  bcast: 'white', label: '白防', img: './a_white.png' },
            { id: 'w_bless', scrollType: 'weapon', bcast: 'bless', label: '祝武', img: './w_bless.png' },
            { id: 'a_bless', scrollType: 'armor',  bcast: 'bless', label: '祝防', img: './a_bless.png' },
            { id: 'w_curse', scrollType: 'weapon', bcast: 'curse', label: '詛武', img: './w_curse.png' },
            { id: 'a_curse', scrollType: 'armor',  bcast: 'curse', label: '詛防', img: './a_curse.png' },
            { id: 'w_protect', scrollType: 'support', bcast: 'protect', label: '保護', img: './w_protect.png' }
        ];

        function renderInventory() {
            const sGrid = document.getElementById('scrolls-grid'); sGrid.innerHTML = '';
            scrollsData.forEach(s => {
                const div = document.createElement('div');
                div.className = `inv-slot ${selectedScroll?.id === s.id ? 'selected' : ''}`;
                div.innerHTML = `<img src="${s.img}"><span>${s.label}</span>`;
                div.onclick = () => { selectedScroll = s; renderInventory(); };
                sGrid.appendChild(div);
            });
            const eGrid = document.getElementById('equip-grid'); eGrid.innerHTML = '';
            Object.keys(itemsState).forEach(id => {
                const item = itemsState[id];
                const div = document.createElement('div');
                div.className = `inv-slot ${id === activeItemId ? 'active-item' : ''}`;
                div.id = 'slot-'+id;
                div.innerHTML = `<img src="${item.img}"><span>安:${item.safe}</span>`;
                div.onclick = () => { activeItemId = id; renderInventory(); updateStage(); };
                eGrid.appendChild(div);
            });
            refreshBadges();
        }

        function refreshBadges() {
            Object.keys(itemsState).forEach(id => {
                const slot = document.getElementById('slot-'+id);
                if (!slot) return;
                const badge = document.createElement('span');
                badge.className = 'absolute top-0.5 right-1 text-[10px] font-bold text-green-400';
                if (itemsState[id].isBroken) badge.innerText = '❌';
                else if (itemsState[id].level > 0) badge.innerText = '+'+itemsState[id].level;
                slot.appendChild(badge);
            });
        }

        function executeLogic() {
            const scr = selectedScroll;
            const cur = itemsState[activeItemId];
            if (cur.isBroken || !scr || (scr.scrollType !== 'support' && scr.scrollType !== cur.type)) return;
            if (scr.bcast === 'protect') { cur.isProtected = true; addChat("保護開啟"); }
            else if (scr.bcast === 'curse') { if(cur.level > 0) cur.level--; addChat("詛咒"); }
            else {
                let chance = (cur.level >= cur.safe) ? (cur.level - cur.safe === 0 ? 33 : (cur.level - cur.safe === 1 ? 25 : 20)) : 100;
                if (Math.random()*100 < chance) {
                    let plus = (scr.bcast === 'bless') ? (cur.type === 'weapon' ? (cur.level < 6 ? (Math.random()<0.5?2:1) : 1) : (cur.level < 3 ? (Math.random()<0.33?3:(Math.random()<0.66?2:1)) : (Math.random()<0.5?2:1))) : 1;
                    cur.level += plus; addChat("成功 +"+plus);
                } else if (cur.isProtected) { cur.isProtected = false; addChat("保護失效"); }
                else { cur.isBroken = true; addChat("裝備消失"); }
            }
            renderInventory(); updateStage();
        }

        function addChat(t) { const c = document.getElementById('system-chat'); c.innerHTML += `<p>• ${t}</p>`; c.scrollTop = c.scrollHeight; }
        function updateStage() {
            const cur = itemsState[activeItemId];
            document.getElementById('stage-img').src = cur.img;
            document.getElementById('stage-name').innerText = cur.isBroken ? "已消失" : "+"+cur.level+" "+cur.name;
            document.getElementById('protect-badge').classList.toggle('hidden', !cur.isProtected);
            document.getElementById('stage-status').innerText = cur.isBroken ? "已被摧毀。" : (cur.level < cur.safe ? "安定值內，絕對安全。" : "⚠️ 已過安定值！");
        }
        function resetGame() { itemsState = JSON.parse(JSON.stringify(initialData)); renderInventory(); updateStage(); addChat("重置完成"); }
        document.getElementById('stage-box').onclick = executeLogic;
        renderInventory(); updateStage();
    </script>
</body>
</html>
