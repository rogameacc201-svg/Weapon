<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>好玩衝裝模擬器</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body {
            background-color: #030508;
            color: #c0c6d0;
            font-family: 'MingLiU', 'PMingLiU', 'Microsoft JhengHei', sans-serif;
            image-rendering: pixelated;
            font-size: 18px; /* 字體再放大 */
        }
        .inv-container {
            background-color: #121319;
            border: 3px solid #32353d;
        }
        .inv-grid {
            border-top: 2px solid #20222a;
            border-left: 2px solid #20222a;
        }
        .inv-slot {
            background-color: #000000;
            border-right: 2px solid #20222a;
            border-bottom: 2px solid #20222a;
            aspect-ratio: 1;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .inv-slot img {
            width: 60px; /* 圖示放大至框架極限 */
            height: 60px;
            object-fit: contain;
        }
        .inv-slot.active-item { border: 3px solid #daa520 !important; }
        .inv-slot.selected { background-color: #1a2238 !important; }
        #system-chat { font-size: 16px; line-height: 1.5; } /* 頻道字體放大 */
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center py-4 px-3 select-none">

    <div class="w-full max-w-4xl flex flex-col lg:flex-row gap-5 items-stretch">
        <div class="flex-1 w-full flex flex-col gap-4">
            <div class="bg-[#0b0c10] border-2 border-[#262833] rounded-lg p-8 flex flex-col items-center justify-center relative min-h-[300px]">
                <div id="protect-badge" class="absolute top-4 right-6 text-lg font-bold text-amber-400 hidden">【✨ 保護中】</div>
                <div id="stage-box" class="w-36 h-36 bg-black border-2 border-[#4c5161] rounded flex items-center justify-center cursor-pointer hover:bg-gray-900/50">
                    <img id="stage-img" src="./w1.png" class="w-28 h-28 object-contain">
                </div>
                <h3 id="stage-name" class="mt-4 text-2xl font-bold text-[#e6bc55]">克特之劍</h3>
                <p id="stage-status" class="text-base text-green-500 mt-2">安定值內，絕對安全。</p>
            </div>
            <div class="bg-black border border-[#20222a] p-4 rounded-lg">
                <div id="system-chat" class="font-mono h-[140px] overflow-y-auto text-gray-400">
                    <p>• 系統已就緒，請操作。</p>
                </div>
            </div>
        </div>

        <div class="w-full lg:w-[400px] inv-container rounded-lg p-4">
            <div class="grid grid-cols-4 sm:grid-cols-5 inv-grid bg-black mb-4" id="scrolls-grid"></div>
            <div class="grid grid-cols-3 inv-grid bg-black" id="equip-grid"></div>
        </div>
    </div>

    <script>
        let itemsState = {
            'w1': { id: 'w1', name: '克特之劍', type: 'weapon', level: 0, safe: 6, isBroken: false, isProtected: false, img: './w1.png' },
            'a1': { id: 'a1', name: '風龍盔甲', type: 'armor', level: 0, safe: 4, isBroken: false, isProtected: false, img: './a1.png' },
            'a2': { id: 'a2', name: '風龍鞋', type: 'armor', level: 0, safe: 6, isBroken: false, isProtected: false, img: './a2.png' }
        };
        let activeItemId = 'w1';
        let selectedScroll = null;
        const scrollsData = [
            { id: 'w_white', scrollType: 'weapon', bcast: 'white', label: '白武', img: './w_white.png' },
            { id: 'a_white', scrollType: 'armor',  bcast: 'white', label: '白防', img: './a_white.png' },
            { id: 'w_bless', scrollType: 'weapon', bcast: 'bless', label: '祝武', img: './w_bless.png' },
            { id: 'a_bless', scrollType: 'armor',  bcast: 'bless', label: '祝防', img: './a_bless.png' },
            { id: 'w_curse', scrollType: 'weapon', bcast: 'curse', label: '詛武', img: './w_curse.png' },
            { id: 'a_curse', scrollType: 'armor',  bcast: 'curse', label: '詛防', img: './a_curse.png' },
            { id: 'w_protect', scrollType: 'support', bcast: 'protect', label: '保護', img: './w_protect.png' }
        ];

        function render() {
            const sGrid = document.getElementById('scrolls-grid'); sGrid.innerHTML = '';
            scrollsData.forEach(s => {
                const div = document.createElement('div');
                div.className = `inv-slot ${selectedScroll?.id === s.id ? 'selected' : ''}`;
                div.innerHTML = `<img src="${s.img}"><span class="text-xs font-bold mt-1 text-gray-300">${s.label}</span>`;
                div.onclick = () => { selectedScroll = s; render(); };
                sGrid.appendChild(div);
            });
            const eGrid = document.getElementById('equip-grid'); eGrid.innerHTML = '';
            Object.keys(itemsState).forEach(id => {
                const item = itemsState[id];
                const div = document.createElement('div');
                div.className = `inv-slot ${id === activeItemId ? 'active-item' : ''}`;
                div.innerHTML = `<img src="${item.img}"><span class="text-xs font-bold mt-1 text-amber-600">安:${item.safe}</span>`;
                div.onclick = () => { activeItemId = id; render(); updateStage(); };
                eGrid.appendChild(div);
            });
            updateStage();
        }

        function executeLogic() {
            const cur = itemsState[activeItemId];
            const scr = selectedScroll;
            if (!scr || cur.isBroken) return;
            if (scr.scrollType !== 'support' && scr.scrollType !== cur.type) return;

            if (scr.bcast === 'protect') { cur.isProtected = true; addLog("🛡️ 施加保護中"); }
            else if (scr.bcast === 'curse') { if (cur.level > 0) cur.level--; addLog("🩸 詛咒退階"); }
            else {
                let chance = (cur.level >= cur.safe) ? (cur.level - cur.safe === 0 ? 33 : (cur.level - cur.safe === 1 ? 25 : 20)) : 100;
                if (Math.random() * 100 < chance) {
                    let plus = 1;
                    if (scr.bcast === 'bless') {
                        if (cur.type === 'weapon') plus = (cur.level < 6) ? (Math.random() < 0.5 ? 2 : 1) : 1;
                        else plus = (cur.level < 3) ? (Math.random() < 0.33 ? 3 : (Math.random() < 0.66 ? 2 : 1)) : (Math.random() < 0.5 ? 2 : 1);
                    }
                    cur.level += plus;
                    addLog(`✨ 成功升級 +${plus}`);
                } else if (cur.isProtected) {
                    cur.isProtected = false;
                    if (Math.random() < 0.75 && cur.level > 0) cur.level--;
                    addLog("🛡️ 防爆觸發！保護失效");
                } else {
                    cur.isBroken = true;
                    addLog("💥 裝備已損壞消失");
                }
            }
            render();
        }

        function addLog(t) { const chat = document.getElementById('system-chat'); chat.innerHTML += `<p>• ${t}</p>`; chat.scrollTop = chat.scrollHeight; }
        function updateStage() {
            const cur = itemsState[activeItemId];
            document.getElementById('stage-img').src = cur.img;
            document.getElementById('stage-name').innerText = cur.isBroken ? "已損壞" : `+${cur.level} ${cur.name}`;
            document.getElementById('protect-badge').classList.toggle('hidden', !cur.isProtected);
        }
        document.getElementById('stage-box').onclick = executeLogic;
        render();
    </script>
</body>
</html>
