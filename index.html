<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lineage - 天堂衝裝模擬器</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body { background-color: #030508; color: #c0c6d0; font-family: 'Microsoft JhengHei', sans-serif; }
        .inv-container { background-color: #121319; border: 3px solid #32353d; }
        .inv-grid { border-top: 2px solid #20222a; border-left: 2px solid #20222a; }
        .inv-slot { background-color: #000000; border-right: 2px solid #20222a; border-bottom: 2px solid #20222a; aspect-ratio: 1; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .inv-slot img { width: 36px; height: 36px; object-fit: contain; }
        .inv-slot.selected { background-color: #1a2238 !important; box-shadow: inset 0 0 8px #3b82f6; }
        .inv-slot.active-item { border: 2px solid #daa520 !important; background-color: #1a1710; }
        #system-chat::-webkit-scrollbar { width: 6px; }
        #system-chat::-webkit-scrollbar-thumb { background: #383b47; border-radius: 3px; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-start lg:justify-center py-4 px-3 select-none">
    <div class="w-full max-w-4xl flex flex-col lg:flex-row gap-5 items-stretch">
        <div class="flex-1 w-full flex flex-col justify-between space-y-3">
            <div class="bg-[#0b0c10] border-2 border-[#262833] rounded-lg p-5 flex flex-col items-center justify-center relative min-h-[200px]">
                <div id="protect-badge" class="absolute top-2 right-3 text-sm font-bold text-amber-400 hidden">【✨ 保護中】</div>
                <div id="stage-box" class="w-24 h-24 bg-black border-2 border-[#4c5161] rounded flex items-center justify-center cursor-pointer">
                    <img id="stage-img" src="./w1.png" alt="裝備" class="w-14 h-14 object-contain" onerror="this.style.opacity='0.2';">
                </div>
                <h3 id="stage-name" class="mt-3 text-lg font-bold text-[#e6bc55]">瑟魯基之劍</h3>
                <p id="stage-status" class="text-sm text-green-500">安定值內，絕對安全。</p>
            </div>
            <div class="bg-black border border-[#20222a] p-3 rounded-lg">
                <div id="system-chat" class="text-xs space-y-1 font-mono h-[120px] overflow-y-auto text-gray-400"></div>
            </div>
        </div>
        <div class="w-full lg:w-[360px] inv-container rounded-lg p-3">
            <div class="grid grid-cols-4 sm:grid-cols-7 inv-grid bg-black mb-3" id="scrolls-grid"></div>
            <div class="grid grid-cols-3 inv-grid bg-black" id="equip-grid"></div>
        </div>
    </div>

    <script>
        let itemsState = {
            'w1': { id: 'w1', name: '瑟魯基之劍', type: 'weapon', level: 0, safe: 6, isBroken: false, isProtected: false, img: './w1.png' },
            'a1': { id: 'a1', name: '精靈金屬盔甲', type: 'armor', level: 0, safe: 4, isBroken: false, isProtected: false, img: './a1.png' },
            'a2': { id: 'a2', name: '矮人肩膀防具', type: 'armor', level: 0, safe: 6, isBroken: false, isProtected: false, img: './a2.png' }
        };
        let activeItemId = 'w1';
        let selectedScroll = null;
        const scrollsData = [
            { id: 'w_white', scrollType: 'weapon', bcast: 'white', label: '白武', img: './w_white.png' },
            { id: 'a_white', scrollType: 'armor',  bcast: 'white', label: '白防', img: './a_white.png' },
            { id: 'w_bless', scrollType: 'weapon', bcast: 'bless', label: '祝武', img: './w_bless.png' },
            { id: 'a_bless', scrollType: 'armor',  bcast: 'bless', label: '祝防', img: './a_bless.png' },
            { id: 'w_curse', scrollType: 'weapon', bcast: 'curse', label: '詛武', img: './w_curse.png' },
            { id: 'a_curse', scrollType: 'armor',  bcast: 'curse', label: '詛防', img: './a_curse.png' },
            { id: 'w_protect', scrollType: 'support', bcast: 'protect', label: '保護', img: './w_protect.png' }
        ];

        function render() {
            const sGrid = document.getElementById('scrolls-grid');
            sGrid.innerHTML = '';
            scrollsData.forEach(s => {
                const div = document.createElement('div');
                div.className = 'inv-slot';
                if (selectedScroll?.id === s.id) div.classList.add('selected');
                div.innerHTML = `<img src="${s.img}">`;
                div.onclick = () => { selectedScroll = s; render(); };
                sGrid.appendChild(div);
            });
            const eGrid = document.getElementById('equip-grid');
            eGrid.innerHTML = '';
            Object.keys(itemsState).forEach(id => {
                const item = itemsState[id];
                const div = document.createElement('div');
                div.className = 'inv-slot';
                if (id === activeItemId) div.classList.add('active-item');
                div.innerHTML = `<img src="${item.img}">`;
                div.onclick = () => { activeItemId = id; render(); };
                eGrid.appendChild(div);
            });
            updateStage();
        }

        function executeLogic() {
            const scr = selectedScroll;
            const current = itemsState[activeItemId];
            if (!scr || current.isBroken) return;
            if (scr.scrollType !== 'support' && scr.scrollType !== current.type) return;

            if (scr.bcast === 'protect') { current.isProtected = true; }
            else if (scr.bcast === 'curse') { if (current.level > 0) current.level--; }
            else {
                let chance = 100;
                if (current.level >= current.safe) {
                    const over = current.level - current.safe;
                    chance = over === 0 ? 33 : (over === 1 ? 25 : (over === 2 ? 20 : 10));
                }
                if (Math.random() * 100 < chance) current.level++;
                else if (current.isProtected) current.isProtected = false;
                else current.isBroken = true;
            }
            addLog(`施法結果: ${current.isBroken ? '損壞' : '完成'}`);
            render();
        }

        function addLog(txt) {
            const chat = document.getElementById('system-chat');
            chat.innerHTML += `<p>• ${txt}</p>`;
            chat.scrollTop = chat.scrollHeight;
        }

        function updateStage() {
            const item = itemsState[activeItemId];
            document.getElementById('stage-img').src = item.img;
            document.getElementById('stage-name').innerText = item.isBroken ? "已損壞" : `+${item.level} ${item.name}`;
            document.getElementById('protect-badge').classList.toggle('hidden', !item.isProtected);
        }

        document.getElementById('stage-box').onclick = executeLogic;
        render();
    </script>
</body>
</html>
