<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>好玩衝裝模擬器</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body { background-color: #030508; color: #c0c6d0; font-family: 'MingLiU', 'PMingLiU', 'Microsoft JhengHei', sans-serif; image-rendering: pixelated; font-size: 16px; }
        .inv-container { background-color: #121319; border: 2px solid #32353d; padding: 10px; }
        .inv-grid { display: grid; gap: 2px; }
        #scrolls-grid { grid-template-columns: repeat(4, 1fr); }
        #equip-grid { grid-template-columns: repeat(3, 1fr); }
        @media (min-width: 768px) { #scrolls-grid { grid-template-columns: repeat(7, 1fr); } .w-full.max-w-3xl { max-width: 850px; } }
        .inv-slot { background-color: #000000; aspect-ratio: 1; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; border: 1px solid #20222a; }
        .inv-slot img { width: 80%; height: 60%; object-fit: contain; image-rendering: pixelated; }
        .inv-slot span { font-size: 0.7em; margin-top: 2px; }
        .inv-slot.selected { background-color: #1a2238 !important; box-shadow: inset 0 0 8px #3b82f6; }
        .inv-slot.active-item { border: 2px solid #daa520 !important; background-color: #1a1710; }
        #system-chat { font-size: 14px; }
        .rank-col { width: 140px; font-size: 11px; }
        .rank-row { display: flex; justify-content: space-between; border-bottom: 1px solid #222; padding: 2px 0; color: #9ca3af; }
    </style>
</head>
<body class="min-h-screen py-4 px-3 flex flex-col items-center select-none">

    <div id="login-modal" class="fixed inset-0 bg-black/95 z-50 flex items-center justify-center p-4">
        <div class="bg-[#121319] border border-[#32353d] p-6 rounded-lg w-full max-w-sm text-center">
            <h2 class="text-amber-500 font-bold mb-4">輸入名稱開始模擬</h2>
            <input type="text" id="username-input" class="w-full bg-black border border-[#44485c] p-2 text-white mb-4 rounded">
            <button onclick="login()" class="w-full bg-amber-600 hover:bg-amber-500 text-black font-bold py-2 rounded transition">進入</button>
        </div>
    </div>

    <div class="w-full max-w-3xl flex flex-row gap-6">
        <div class="flex-1 flex flex-col gap-3">
            <div class="inv-container rounded-lg">
                <span class="text-[12px] font-bold text-gray-500 mb-2 block">SCROLLS</span>
                <div class="inv-grid" id="scrolls-grid"></div>
            </div>
            <div class="flex gap-2 items-stretch">
                <div class="flex-1 bg-[#0b0c10] border border-[#262833] rounded-lg p-4 flex flex-col items-center justify-center relative">
                    <div id="protect-badge" class="absolute top-2 right-2 text-[10px] font-bold text-amber-400 hidden">【保護中】</div>
                    <div id="stage-box" class="w-20 h-20 bg-black border border-[#444551] rounded flex items-center justify-center cursor-pointer hover:bg-gray-900/50 transition active:scale-95">
                        <img id="stage-img" src="./w1.png" class="w-14 h-14 object-contain">
                    </div>
                    <div class="mt-2 text-center">
                        <h3 id="stage-name" class="font-bold text-[#e6bc55] text-sm">克特之劍</h3>
                        <p id="stage-status" class="text-[10px] text-green-500">安定值內，絕對安全。</p>
                    </div>
                </div>
                <button onclick="resetGame()" class="w-12 bg-[#2a2c38] hover:bg-[#383b4c] text-gray-200 rounded border border-[#44485c] font-bold text-xs">重置</button>
                <button onclick="changeName()" class="w-12 bg-[#382a2a] hover:bg-[#4c3838] text-gray-200 rounded border border-[#5c4444] font-bold text-xs">更名</button>
            </div>
            <div class="inv-container rounded-lg">
                <span class="text-[12px] font-bold text-gray-500 mb-2 block">EQUIPMENT</span>
                <div class="inv-grid" id="equip-grid"></div>
            </div>
        </div>

        <div class="flex gap-4">
            <div class="rank-col"><div class="text-amber-500 mb-2 font-bold">【武器排行】</div><div id="list-w1"></div></div>
            <div class="rank-col"><div class="text-blue-400 mb-2 font-bold">【盔甲排行】</div><div id="list-a1"></div></div>
            <div class="rank-col"><div class="text-green-400 mb-2 font-bold">【鞋子排行】</div><div id="list-a2"></div></div>
        </div>
    </div>

    <script>
        // === 原始設定 (不更動) ===
        let initialData = {
            'w1': { id: 'w1', name: '克特之劍', type: 'weapon', level: 0, safe: 6, isBroken: false, isProtected: false, img: './w1.png' },
            'a1': { id: 'a1', name: '風龍盔甲', type: 'armor', level: 0, safe: 4, isBroken: false, isProtected: false, img: './a1.png' },
            'a2': { id: 'a2', name: '風龍鞋', type: 'armor', level: 0, safe: 6, isBroken: false, isProtected: false, img: './a2.png' }
        };
        let itemsState = JSON.parse(JSON.stringify(initialData));
        let activeItemId = 'w1';
        let selectedScroll = null;
        const scrollsData = [ /* ...省略... */ ];

        // === 原始函數區 (不更動) ===
        function renderInventory() { /* ...省略(保持原邏輯)... */ }
        function refreshBadges() { /* ...省略(保持原邏輯)... */ }
        function executeLogic() { 
            /* 保持原邏輯 */ 
            // 在結尾加入觸發同步：
            updatePublicRank();
            renderInventory(); 
            updateStage(); 
        }
        function updateStage() { /* ...保持原邏輯... */ }
        function resetGame() { itemsState = JSON.parse(JSON.stringify(initialData)); renderInventory(); updateStage(); }

        // === 排行榜與雲端同步機制 (外掛) ===
        let userName = "";
        function login() { userName = document.getElementById('username-input').value; if(userName) document.getElementById('login-modal').style.display = 'none'; }
        
        function changeName() {
            let newName = prompt("請輸入新名稱");
            if(newName) { userName = newName; }
        }

        // 模擬伺服器端資料 (若在真實伺服器，這裡會改為 fetch 請求)
        function updatePublicRank() {
            // 使用 sessionStorage 作為跨頁面共享 (真實環境應改用 Firebase 或後端 API)
            let r = JSON.parse(localStorage.getItem('public_ranks')) || {w1:[], a1:[], a2:[]};
            let cur = itemsState[activeItemId];
            
            if(cur.level > 0) {
                // 移除此使用者舊資料，更新新紀錄
                r[activeItemId] = r[activeItemId].filter(i => i.n !== userName);
                r[activeItemId].push({n: userName, l: cur.level});
                r[activeItemId].sort((a,b) => b.l - a.l);
                r[activeItemId] = r[activeItemId].slice(0, 10);
                localStorage.setItem('public_ranks', JSON.stringify(r));
            }
            displayRanks();
        }

        function displayRanks() {
            let r = JSON.parse(localStorage.getItem('public_ranks')) || {w1:[], a1:[], a2:[]};
            Object.keys(r).forEach(k => {
                document.getElementById('list-'+k).innerHTML = r[k].map((x,i) => 
                    `<div class="rank-row"><span>${i+1}.${x.n}</span><span>+${x.l}</span></div>`
                ).join('');
            });
        }
        
        // 綁定與啟動
        document.getElementById('stage-box').onclick = executeLogic;
        renderInventory(); updateStage(); displayRanks();
    </script>
</body>
</html>
