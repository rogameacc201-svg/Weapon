<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lineage - 天堂衝裝模擬器</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body {
            background-color: #030508;
            color: #c0c6d0;
            font-family: 'MingLiU', 'PMingLiU', 'Microsoft JhengHei', sans-serif;
            image-rendering: pixelated;
        }
        .inv-container {
            background-color: #121319;
            border: 3px solid #32353d;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.8), 0 10px 25px rgba(0,0,0,0.9);
        }
        .inv-grid {
            border-top: 2px solid #20222a;
            border-left: 2px solid #20222a;
        }
        .inv-slot {
            background-color: #000000;
            border-right: 2px solid #20222a;
            border-bottom: 2px solid #20222a;
            aspect-ratio: 1;
            position: relative;
            cursor: pointer;
            transition: background 0.1s;
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-tap-highlight-color: transparent;
        }
        @media (hover: hover) {
            .inv-slot:hover {
                background-color: #141722;
            }
        }
        .inv-slot img {
            width: 36px;
            height: 36px;
            object-fit: contain;
            image-rendering: pixelated;
        }
        .inv-slot.selected {
            background-color: #1a2238 !important;
            box-shadow: inset 0 0 8px #3b82f6;
        }
        .inv-slot.active-item {
            border: 2px solid #daa520 !important;
            background-color: #1a1710;
        }
        #system-chat::-webkit-scrollbar {
            width: 6px;
        }
        #system-chat::-webkit-scrollbar-thumb {
            background: #383b47;
            border-radius: 3px;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-start lg:justify-center py-4 px-3 select-none">

    <div class="w-full max-w-4xl flex flex-col lg:flex-row gap-5 items-stretch">
        <div class="flex-1 w-full flex flex-col justify-between space-y-3">
            <div class="bg-[#0b0c10] border-2 border-[#262833] rounded-lg p-5 flex flex-col items-center justify-center relative min-h-[200px] md:min-h-[230px]">
                <div id="protect-badge" class="absolute top-2 right-3 text-xs md:text-sm font-bold text-amber-400 hidden">【✨ 保護中】</div>
                <div class="text-[11px] text-gray-500 absolute top-2 left-2">【精煉裝備舞台】</div>
                
                <div id="stage-box" class="w-20 h-20 md:w-24 md:h-24 bg-black border-2 border-[#4c5161] rounded flex items-center justify-center relative cursor-pointer hover:bg-gray-900/50 transition active:scale-95">
                    <img id="stage-img" src="./w1.png" alt="裝備" class="w-14 h-14 object-contain" onerror="this.style.opacity='0.2';">
                    <span id="stage-prefix" class="absolute top-1 left-1 text-sm font-bold text-green-400"></span>
                </div>
                <div class="mt-3 text-center">
                    <h3 id="stage-name" class="text-base md:text-lg font-bold text-[#e6bc55] tracking-wide">瑟魯基之劍</h3>
                    <p id="stage-status" class="text-xs md:text-sm text-green-500 mt-1">這件物品在安定值內，絕對安全。</p>
                </div>
                <div id="result-toast" class="absolute inset-0 flex items-center justify-center bg-black/80 rounded-lg opacity-0 pointer-events-none transition-opacity duration-150">
                    <span id="toast-text" class="text-sm md:text-base font-bold tracking-wider text-center px-4"></span>
                </div>
            </div>

            <div class="bg-[#0b0c10] border border-[#262833] p-3 rounded-lg flex justify-between items-center text-xs gap-3">
                <span class="text-gray-400 leading-relaxed">💡 操作提醒：先點右側「裝備」切換目標，再選「卷軸」並點擊左側「大裝備框」衝裝！</span>
                <button onclick="resetGame()" class="bg-[#2a2c38] hover:bg-[#383b4c] text-gray-200 px-3 py-2 rounded border border-[#44485c] transition shrink-0 font-bold active:scale-95">
                    重置
                </button>
            </div>

            <div class="bg-black border border-[#20222a] p-3 rounded-lg">
                <div class="text-[11px] font-bold text-[#4c5a70] mb-1">【系統頻道】</div>
                <div id="system-chat" class="text-xs space-y-1 font-mono h-[100px] md:h-[120px] overflow-y-auto text-gray-400">
                    <p class="text-gray-500">• 模擬器已就緒 (無動畫版)。</p>
                </div>
            </div>
        </div>

        <div class="w-full lg:w-[360px] inv-container rounded-lg p-3 flex flex-col justify-between shrink-0 gap-3">
            <div>
                <div class="flex justify-between items-center mb-2 px-1">
                    <span class="text-xs font-bold text-gray-400 tracking-wider">INVENTORY (道具欄)</span>
                    <button class="w-4 h-4 bg-[#23252e] border border-[#3d4152] text-[10px] text-gray-400 flex items-center justify-center font-bold">×</button>
                </div>
                <div class="mb-3">
                    <div class="text-[11px] font-bold text-[#556276] mb-1">【魔法卷軸類】</div>
                    <div class="grid grid-cols-4 sm:grid-cols-7 inv-grid bg-black" id="scrolls-grid"></div>
                </div>
                <div>
                    <div class="text-[11px] font-bold text-[#556276] mb-1">【精煉裝備類】</div>
                    <div class="grid grid-cols-3 inv-grid bg-black" id="equip-grid"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSound(type) {
            try {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain); gain.connect(audioCtx.destination);
                if (type === 'success') {
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(587.33, audioCtx.currentTime);
                    osc.frequency.setValueAtTime(880.00, audioCtx.currentTime + 0.08);
                    gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
                    osc.start(); osc.stop(audioCtx.currentTime + 0.3);
                } else if (type === 'fail') {
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(140, audioCtx.currentTime);
                    osc.frequency.linearRampToValueAtTime(30, audioCtx.currentTime + 0.4);
                    gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
                    osc.start(); osc.stop(audioCtx.currentTime + 0.4);
                } else if (type === 'click') {
                    osc.type = 'triangle';
                    osc.frequency.setValueAtTime(280, audioCtx.currentTime);
                    gain.gain.setValueAtTime(0.08, audioCtx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.05);
                    osc.start(); osc.stop(audioCtx.currentTime + 0.05);
                }
            } catch(e){}
        }

        let itemsState = {
            'w1': { id: 'w1', name: '瑟魯基之劍', type: 'weapon', level: 0, safe: 6, isBroken: false, isProtected: false, img: './w1.png' },
            'a1': { id: 'a1', name: '精靈金屬盔甲', type: 'armor', level: 0, safe: 4, isBroken: false, isProtected: false, img: './a1.png' },
            'a2': { id: 'a2', name: '矮人肩膀防具', type: 'armor', level: 0, safe: 6, isBroken: false, isProtected: false, img: './a2.png' }
        };

        let activeItemId = 'w1';
        let selectedScroll = null;

        const scrollsData = [
            { id: 'w_white', name: '對武器施法的卷軸', scrollType: 'weapon', bcast: 'white', label: '白武', img: './w_white.png' },
            { id: 'a_white', name: '對盔甲施法的卷軸', scrollType: 'armor',  bcast: 'white', label: '白防', img: './a_white.png' },
            { id: 'w_bless', name: '(祝福) 對武器施法的卷軸', scrollType: 'weapon', bcast: 'bless', label: '祝武', img: './w_bless.png' },
            { id: 'a_bless', name: '(祝福) 對盔甲施法的卷軸', scrollType: 'armor',  bcast: 'bless', label: '祝防', img: './a_bless.png' },
            { id: 'w_curse', name: '(詛咒) 對武器施法的卷軸', scrollType: 'weapon', bcast: 'curse', label: '詛武', img: './w_curse.png' },
            { id: 'a_curse', name: '(詛咒) 對盔甲施法的卷軸', scrollType: 'armor',  bcast: 'curse', label: '詛防', img: './a_curse.png' },
            { id: 'w_protect', name: '保護卷軸', scrollType: 'support', bcast: 'protect', label: '保護', img: './w_protect.png' }
        ];

        function renderInventory() {
            const sGrid = document.getElementById('scrolls-grid');
            sGrid.innerHTML = '';
            scrollsData.forEach(scr => {
                const slot = document.createElement('div');
                slot.className = 'inv-slot flex flex-col p-0.5 text-center';
                slot.innerHTML = `<img src="${scr.img}" onerror="this.style.opacity='0.2';"><span class="text-[9px] text-gray-400 font-bold scale-90">${scr.label}</span>`;
                if (selectedScroll?.id === scr.id) slot.classList.add('selected');
                slot.onclick = () => { selectedScroll = scr; renderInventory(); playSound('click'); };
                sGrid.appendChild(slot);
            });

            const eGrid = document.getElementById('equip-grid');
            eGrid.innerHTML = '';
            Object.keys(itemsState).forEach(id => {
                const item = itemsState[id];
                const slot = document.createElement('div');
                slot.className = 'inv-slot flex flex-col p-0.5 text-center' + (id === activeItemId ? ' active-item' : '');
                slot.id = `slot-${item.id}`;
                slot.innerHTML = `<img src="${item.img}" onerror="this.style.opacity='0.2';"><span class="text-[9px] text-amber-600 font-bold scale-90">安:${item.safe}</span>`;
                slot.onclick = () => { activeItemId = id; playSound('click'); renderInventory(); updateStage(); };
                eGrid.appendChild(slot);
            });
            refreshBadges();
        }

        function refreshBadges() {
            Object.keys(itemsState).forEach(id => {
                const slot = document.getElementById(`slot-${id}`);
                if (!slot) return;
                const oldBadge = slot.querySelector('.item-badge');
                if (oldBadge) oldBadge.remove();
                const badge = document.createElement('span');
                badge.className = 'item-badge absolute top-0.5 right-1 text-[10px] font-bold font-mono';
                if (itemsState[id].isBroken) badge.innerText = '❌';
                else if (itemsState[id].level > 0) { badge.innerText = `+${itemsState[id].level}`; badge.className += ' text-green-400'; }
                slot.appendChild(badge);
            });
        }

        function enchant() {
            const current = itemsState[activeItemId];
            if (current.isBroken) { addChatLog("❌ 裝備已損壞，請重置。", "#ff5555"); return; }
            if (!selectedScroll) { addChatLog("❌ 請選卷軸！", "#ff5555"); return; }
            if (selectedScroll.scrollType !== 'support' && selectedScroll.scrollType !== current.type) {
                addChatLog(`❌ 種類不符！`, "#ff5555"); return;
            }
            executeLogic();
        }

        function executeLogic() {
            const scr = selectedScroll;
            const current = itemsState[activeItemId];
            const lvl = current.level;
            const safe = current.safe;

            if (scr.bcast === 'protect') {
                if (current.isProtected) { showToast("已在保護中", "text-gray-400"); }
                else { current.isProtected = true; playSound('success'); showToast("附加防爆狀態！", "text-amber-400"); }
            } else if (scr.bcast === 'curse') {
                if (lvl > 0) { current.level -= 1; playSound('success'); showToast("詛咒退階", "text-red-500"); }
                else { playSound('click'); showToast("無事發生", "text-gray-400"); }
            } else {
                let successChance = (lvl >= safe) ? (lvl - safe === 0 ? 33 : (lvl - safe === 1 ? 25 : 20)) : 100;
                if (Math.random() * 100 < successChance) {
                    let plus = 1;
                    if (scr.bcast === 'bless') {
                        if (current.type === 'weapon') plus = (lvl < 6) ? (Math.random() < 0.5 ? 2 : 1) : 1;
                        else plus = (lvl < 3) ? (Math.random() < 0.33 ? 3 : (Math.random() < 0.66 ? 2 : 1)) : (Math.random() < 0.5 ? 2 : 1);
                    }
                    current.level += plus;
                    playSound('success');
                    showToast(`強化成功 +${plus}`, 'text-blue-400');
                } else if (current.isProtected) {
                    current.isProtected = false;
                    if (Math.random() < 0.75 && lvl > 0) current.level -= 1;
                    playSound('success');
                    showToast("防爆觸發", "text-amber-500");
                } else {
                    current.isBroken = true;
                    playSound('fail');
                    showToast("裝備消失", "text-red-600");
                }
            }
            updateStage();
            renderInventory();
        }

        function updateStage() {
            const current = itemsState[activeItemId];
            document.getElementById('stage-img').src = current.img;
            document.getElementById('stage-name').innerText = current.isBroken ? "已消失" : (current.level > 0 ? `+${current.level} ` : "") + current.name;
            document.getElementById('protect-badge').classList.toggle('hidden', !current.isProtected);
            document.getElementById('stage-status').innerText = current.isBroken ? "已被摧毀。" : (current.level < current.safe ? "安定值內，絕對安全。" : "⚠️ 已過安定值！");
        }

        function showToast(text, color) {
            const toast = document.getElementById('result-toast');
            const txt = document.getElementById('toast-text');
            txt.innerText = text; txt.className = `text-base font-bold ${color}`;
            toast.style.opacity = '1';
            setTimeout(() => { toast.style.opacity = '0'; }, 800);
        }

        function addChatLog(text, color) {
            const chat = document.getElementById('system-chat');
            chat.innerHTML += `<p style="color:${color}">• ${text}</p>`;
            chat.scrollTop = chat.scrollHeight;
        }

        function resetGame() { location.reload(); }
        document.getElementById('stage-box').onclick = enchant;
        renderInventory();
        updateStage();
    </script>
</body>
</html>
